<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Reset Password</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        const API_URL = "http://localhost:3000";
    </script>
</head>

<body class="bg-gray-900 text-white font-display">

<div class="flex min-h-screen items-center justify-center px-4">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-xl w-full max-w-md">

        <!-- CODE SECTION -->
        <div id="codeSection">
            <h2 class="text-3xl font-bold mb-2">Enter Reset Code</h2>
            <p class="text-gray-400 mb-6">
                Enter the 6-digit code sent to your email.
            </p>

            <form id="verifyForm" class="space-y-4">
                <input id="code" maxlength="6" required
                       class="w-full px-4 py-3 bg-gray-700 rounded-lg" placeholder="6-digit code" />

                <button type="submit"
                        class="w-full bg-primary py-3 rounded-lg font-semibold text-white hover:bg-primary/90">
                    Verify Code
                </button>
            </form>

            <p class="text-center mt-3 text-gray-400">
                Didn’t receive the code?
                <a href="#" id="resendLink" class="text-primary hover:underline">Resend</a>
            </p>
        </div>

        <!-- PASSWORD RESET SECTION -->
        <div id="passwordSection" class="hidden">
            <h2 class="text-3xl font-bold mb-2">Create New Password</h2>

            <form id="resetPasswordForm" class="space-y-4">

                <input id="newPassword" minlength="8" type="password" required
                       placeholder="New Password"
                       class="w-full px-4 py-3 bg-gray-700 rounded-lg" />

                <input id="confirmPassword" minlength="8" type="password" required
                       placeholder="Confirm Password"
                       class="w-full px-4 py-3 bg-gray-700 rounded-lg" />

                <button type="submit"
                        class="w-full bg-primary py-3 rounded-lg font-semibold text-white hover:bg-primary/90">
                    Reset Password
                </button>
            </form>
        </div>

    </div>
</div>

<script>
//
// STEP 1: Check session verification
//
window.addEventListener("DOMContentLoaded", async () => {
    const check = await fetch(`${API_URL}/api/check-reset-session`, {
        credentials: "include"
    });

    const data = await check.json();

    if (data.verified) {
        showPasswordForm();
    }
});

function showPasswordForm() {
    document.getElementById("codeSection").classList.add("hidden");
    document.getElementById("passwordSection").classList.remove("hidden");
}

//
// VERIFY RESET CODE
//
document.getElementById("verifyForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = sessionStorage.getItem("resetEmail");
    const code = document.getElementById("code").value;

    const res = await fetch(`${API_URL}/api/verify-reset-code`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ email, code })
    });

    const data = await res.json();

    if (data.success) {
        showPasswordForm();
    } else {
        alert(data.message);
    }
});

//
// RESET PASSWORD
//
document.getElementById("resetPasswordForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (newPassword !== confirmPassword) {
        return alert("Passwords do not match");
    }

    const res = await fetch(`${API_URL}/api/reset-password`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ newPassword })
    });

    const data = await res.json();

    if (data.success) {
        alert("Password changed successfully!");
        sessionStorage.removeItem("resetEmail");
        window.location.href = "login.html";
    } else {
        alert(data.message);
    }
});

//
// RESEND CODE
//
document.getElementById("resendLink").addEventListener("click", async (e) => {
    e.preventDefault();

    const email = sessionStorage.getItem("resetEmail");

    const res = await fetch(`${API_URL}/api/forgot-password`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ email })
    });

    const data = await res.json();
    alert(data.message);
});
</script>

</body>
</html>
